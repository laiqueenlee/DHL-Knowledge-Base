<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHL Knowledge Base</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <button id="logout-btn" class="logout-btn">Logout</button>
    <div id="user-info" class="user-info">
        <span id="welcome-message"></span>
        <span id="role-badge"></span>
    </div>

    <h1>DHL Logistics: Knowledge Base Articles</h1>


    <div id="editor-workspace" class="editor-workspace">
        <div class="workspace-content">
            <h2>Article Workspace</h2>
            <label for="edit-id" style="display: none;">Article ID</label>
            <input type="hidden" id="edit-id">
            
            <label for="edit-title">Article Title</label>
            <input type="text" id="edit-title" class="workspace-input" placeholder="Enter article title...">
            
            <label for="edit-steps">Content/Steps</label>
            <textarea id="edit-steps" class="workspace-textarea" placeholder="Enter content or steps..."></textarea>
            
            <div class="workspace-actions">
                <button id="save-changes-btn" class="btn btn-success">Save Version</button>
                <button id="close-workspace-btn" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <button id="create-article-btn" class="btn btn-success">+ Create Manual Article</button>
        <button id="upload-file-btn" class="btn btn-primary">+ Upload File (.docx, .pdf, .txt)</button>
        <input type="file" id="file-input" style="display:none" accept=".docx,.pdf,.txt">
    </div>

    <!-- Manual Entry Form -->
    <form id="manual-form" class="manual-form" style="display:none;">
        <h3>Manual Entry</h3>
        <input 
            type="text" 
            id="m-title" 
            class="form-input" 
            placeholder="Enter Article Title..." 
            required>
        
        <select id="m-tags" class="form-input" required>
            <option value="">-- Select Category --</option>
            <option value="General">General</option>
            <option value="Logistics">Logistics</option>
            <option value="IT Support">IT Support</option>
            <option value="RPA">RPA</option>
            <option value="Warehouse">Warehouse</option>
        </select>

        <textarea 
            id="m-content" 
            class="form-textarea" 
            placeholder="Type or paste content here..." 
            required></textarea>
        
        <button type="submit" class="btn btn-success">Submit Article</button>
    </form>

    <!-- Filter Container -->
    <div id="filter-container" class="filter-container">
        <strong>Filters:</strong>
        <input 
            type="text" 
            id="search-input" 
            class="filter-input" 
            placeholder="Search title...">
        
        <select id="status-filter" class="filter-select">
            <option value="all">All Statuses</option>
            <option value="Draft">Draft</option>
            <option value="Reviewed">Reviewed</option>
            <option value="Published">Published</option>
        </select>

        <select id="tag-filter" class="filter-select">
            <option value="all">All Tags</option>
            <option value="Logistics">Logistics</option>
            <option value="IT Support">IT Support</option>
            <option value="RPA">RPA</option>
            <option value="Warehouse">Warehouse</option>
        </select>
    </div>

    <div id="articles-list" class="articles-list">Loading articles...</div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
